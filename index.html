<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>OTE B2 Practice 🎯</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f0e8;--card:#fffdf8;--border:#e0dbd0;--txt:#1a1610;--muted:#8a8070;
      --green:#2a5c24;--orange:#c8440a;--blue:#1a3a8f;--purple:#6b35a0;
      --r:16px;--shadow:0 3px 20px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
    .page{min-height:100svh;padding:16px 14px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;max-width:500px;margin:0 auto;}
    .hdr{width:100%;display:flex;align-items:center;justify-content:space-between;}
    .hdr-title{font-family:'Fraunces',serif;font-size:21px;font-weight:900;letter-spacing:-.3px;}
    .hdr-title span{color:var(--green);}
    .level-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;background:var(--green);color:#fff;letter-spacing:.5px;}
    .mod-tabs{width:100%;display:flex;gap:5px;}
    .mod-tab{flex:1;padding:9px 3px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;cursor:pointer;text-align:center;color:var(--muted);transition:all .2s;touch-action:manipulation;letter-spacing:.2px;}
    .mod-tab .t-icon{font-size:18px;display:block;margin-bottom:2px;}
    .mod-tab.active{border-color:var(--green);background:var(--green);color:#fff;}
    .part-tabs{width:100%;display:flex;gap:5px;flex-wrap:wrap;}
    .part-tab{flex:1;min-width:58px;padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;color:var(--muted);transition:all .18s;touch-action:manipulation;}
    .part-tab .pt-num{font-family:'Fraunces',serif;font-size:17px;font-weight:900;display:block;color:var(--txt);}
    .part-tab.active .pt-num{color:#fff;}
    .part-tab.active{color:#fff;}
    .card{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
    .card-hdr{padding:13px 15px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
    .part-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:999px;color:#fff;}
    .card-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;flex:1;line-height:1.2;}
    .q-count{font-size:11px;color:var(--muted);}
    .prog-bar{height:3px;background:var(--border);}
    .prog-fill{height:100%;transition:width .4s ease;}
    .timer-wrap{padding:14px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);}
    .timer-ring{position:relative;width:72px;height:72px;flex-shrink:0;}
    .timer-ring svg{transform:rotate(-90deg);}
    .timer-ring circle{fill:none;stroke-linecap:round;}
    .t-bg{stroke:#e5e0d8;}
    .t-fg{stroke:var(--green);transition:stroke-dashoffset .9s linear,stroke .3s;}
    .t-fg.warn{stroke:var(--orange);}
    .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:22px;font-weight:900;}
    .timer-num.warn{color:var(--orange);}
    .timer-info{flex:1;}
    .timer-label{font-size:12px;color:var(--muted);margin-bottom:3px;}
    .timer-tip{font-size:11px;color:var(--muted);line-height:1.4;}
    .card-body{padding:14px 15px;display:grid;gap:11px;}
    .task-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
    .task-q{font-size:14.5px;line-height:1.55;}
    .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .photo-item{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:4/3;border:2.5px solid transparent;cursor:pointer;transition:border-color .18s,transform .12s;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
    .photo-item:active{transform:scale(.96);}
    .photo-item .ph-emoji{font-size:40px;line-height:1;}
    .photo-item .ph-desc{font-size:10px;color:var(--muted);text-align:center;padding:0 6px;line-height:1.3;}
    .photo-item .ph-lbl{font-size:11px;font-weight:700;color:var(--txt);text-align:center;padding:0 6px;}
    .photo-item.sel{border-color:var(--green);background:#eef4ee;box-shadow:0 0 0 3px rgba(42,92,36,.18);}
    .tick{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:999px;background:var(--green);color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;font-weight:700;}
    .photo-item.sel .tick{display:flex;}
    .sel-hint{font-size:12px;color:var(--muted);text-align:center;}
    .sel-info{font-size:12px;font-weight:600;text-align:center;min-height:18px;color:var(--green);}
    .vm-box{background:#f5f0e6;border-radius:11px;padding:11px 13px;}
    .vm-from{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;}
    .vm-text{font-size:13px;line-height:1.6;}
    .vm-bullets{margin-top:7px;display:grid;gap:4px;}
    .vm-b{font-size:12.5px;display:flex;gap:7px;}
    .vm-b::before{content:"•";flex-shrink:0;margin-top:1px;}
    .int-topic{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);text-align:center;}
    .int-q{font-family:'Fraunces',serif;font-size:17px;font-weight:600;line-height:1.4;text-align:center;padding:4px 0;}
    .fup-box{border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.55;border-left:3px solid var(--blue);}
    .fup-meta{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--blue);margin-bottom:5px;}
    .reading-text{background:#f5f0e6;border-radius:11px;padding:12px 14px;font-size:13px;line-height:1.7;border-left:3px solid var(--orange);}
    .reading-text mark{background:rgba(200,68,10,.12);border-radius:3px;padding:0 2px;font-weight:600;color:var(--orange);}
    .choices{display:grid;gap:7px;}
    .choice{padding:10px 13px;border-radius:9px;border:1.5px solid var(--border);background:#f8f6f0;cursor:pointer;font-size:13.5px;line-height:1.4;text-align:left;color:var(--txt);font-family:'Outfit',sans-serif;transition:background .15s,border-color .15s;touch-action:manipulation;}
    .choice:active{background:#ede8de;}
    .choice.correct{background:rgba(42,92,36,.1);border-color:var(--green);color:var(--green);}
    .choice.wrong{background:rgba(200,68,10,.08);border-color:var(--orange);color:var(--orange);}
    .choice.reveal{background:rgba(42,92,36,.06);border-color:rgba(42,92,36,.3);color:var(--green);}
    .ans-box{background:#f5f0e6;border-radius:10px;padding:11px 13px;display:none;}
    .ans-box.show{display:block;}
    .ans-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
    .ans-text{font-size:13px;color:var(--green);font-weight:600;line-height:1.5;}
    .ans-exp{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;}
    .fill-input{width:100%;background:#f8f6f0;border:1.5px solid var(--border);color:var(--txt);font-family:'Outfit',sans-serif;font-size:14px;padding:10px 12px;border-radius:10px;outline:none;transition:border-color .2s;}
    .fill-input:focus{border-color:var(--green);}
    .prompt-box{background:#f0ede6;border-left:3px solid var(--purple);border-radius:0 10px 10px 0;padding:11px 13px;font-size:13px;line-height:1.6;}
    .model-box{background:#f5f0e6;border-radius:10px;padding:11px 13px;display:none;}
    .model-box.show{display:block;}
    .model-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .model-text{font-size:13px;line-height:1.65;white-space:pre-line;}
    .tip-box{background:#eef4ee;border-radius:10px;padding:10px 12px;font-size:12px;color:var(--green);line-height:1.5;border:1px solid #c5dcc5;}
    .score-strip{width:100%;display:flex;gap:7px;}
    .score-box{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:9px 10px;text-align:center;}
    .score-val{font-family:'Fraunces',serif;font-size:20px;font-weight:900;}
    .score-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}
    .sc-correct .score-val{color:var(--green);}
    .sc-wrong .score-val{color:var(--orange);}
    .starters-card{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);}
    .starters-inner{padding:12px 14px;}
    .starters-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
    .chips{display:flex;flex-wrap:wrap;gap:5px;}
    .chip{font-size:11.5px;padding:4px 10px;border-radius:999px;background:var(--bg);border:1px solid var(--border);color:var(--txt);font-weight:500;line-height:1.3;}
    .card-foot{padding:11px 14px;border-top:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;}
    .btn{flex:1;border:none;border-radius:10px;padding:12px 12px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:600;touch-action:manipulation;transition:transform .1s,background .15s;}
    .btn:active{transform:translateY(1px);}
    .btn-go{color:#fff;}
    .btn-stop{background:var(--orange);color:#fff;}
    .btn-next{background:var(--border);color:var(--txt);}
    .btn-reveal{color:#fff;}
    .btn-check{color:#fff;}
    .btn-y{background:var(--green);color:#fff;}
    .btn-n{background:var(--border);color:var(--txt);}
    .pg-footer{font-size:11px;color:var(--muted);text-align:center;}

    /* ── PLAYPHRASE ── */
    .pp-link{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:7px 13px;border-radius:10px;background:#1c1814;color:#c8f060;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;text-decoration:none;letter-spacing:.2px;border:1.5px solid #3a3820;}
    .pp-link em{font-style:normal;color:#fff;}
    .pp-link:hover{background:#2a2410;}

    /* ── LISTENING ── */
    .audio-wrap{background:#1c1814;border-radius:12px;padding:13px 15px;display:flex;flex-direction:column;gap:9px;}
    .audio-title{color:#c0b8a8;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
    .audio-row{display:flex;align-items:center;gap:10px;}
    .play-btn{width:42px;height:42px;border-radius:50%;background:var(--green);border:none;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
    .audio-mid{flex:1;display:flex;flex-direction:column;gap:5px;}
    .audio-bar{height:3px;background:#3a3020;border-radius:2px;overflow:hidden;}
    .audio-prog{height:100%;background:var(--green);width:0%;transition:width .25s linear;}
    .audio-status{font-size:11.5px;color:#7a7060;}
    .audio-hint{font-size:10px;color:#4a4030;text-align:center;}
    .transcript-box{background:#f5f0e6;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.7;border-left:3px solid var(--blue);display:none;color:#3a3020;font-style:italic;}
    .tr-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11.5px;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;align-self:flex-start;touch-action:manipulation;}
    /* gap fill */
    .gap-row{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;font-size:14px;line-height:1.9;background:#f8f6f0;border-radius:9px;padding:8px 12px;border:1.5px solid var(--border);}
    .gap-in{border:none;border-bottom:2px solid var(--border);background:transparent;font-family:'Outfit',sans-serif;font-size:13.5px;width:100px;text-align:center;padding:1px 4px;outline:none;}
    .gap-in:focus{border-bottom-color:var(--blue);}
    .gap-in.ok{border-bottom-color:var(--green);color:var(--green);}
    .gap-in.err{border-bottom-color:var(--orange);color:var(--orange);}
    /* T/F/NM */
    .tf-item{background:#f5f0e6;border-radius:10px;padding:11px 13px;border-left:3px solid var(--border);transition:border-left-color .2s;}
    .tf-item.good{border-left-color:var(--green);background:rgba(42,92,36,.05);}
    .tf-item.bad{border-left-color:var(--orange);background:rgba(200,68,10,.05);}
    .tf-stmt{font-size:13.5px;line-height:1.5;margin-bottom:8px;}
    .tf-btns{display:flex;gap:5px;}
    .tf-btn{flex:1;padding:7px 3px;font-size:11px;font-weight:700;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;background:var(--card);color:var(--txt);font-family:'Outfit',sans-serif;}
    .tf-btn.t-style{border-color:var(--green);color:var(--green);}
    .tf-btn.f-style{border-color:var(--orange);color:var(--orange);}
    .tf-btn.nm-style{border-color:var(--blue);color:var(--blue);}
    .tf-btn:disabled{opacity:.45;cursor:default;}
    .tf-exp{font-size:12px;color:var(--muted);margin-top:6px;display:none;line-height:1.5;}
    .tf-exp.show{display:block;}
  </style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-title">OTE <span>B2</span> Practice 🎯</div>
    <div class="level-badge">B2</div>
  </div>

  <div class="score-strip">
    <div class="score-box sc-correct"><div class="score-val" id="sC">0</div><div class="score-lbl">Correct</div></div>
    <div class="score-box sc-wrong"><div class="score-val" id="sW">0</div><div class="score-lbl">Wrong</div></div>
    <div class="score-box"><div class="score-val" id="sT">0</div><div class="score-lbl">Done</div></div>
  </div>

  <div class="mod-tabs">
    <button class="mod-tab active" onclick="selectModule(0)"><span class="t-icon">🎙️</span>Speaking</button>
    <button class="mod-tab" onclick="selectModule(1)"><span class="t-icon">📖</span>Reading</button>
    <button class="mod-tab" onclick="selectModule(2)"><span class="t-icon">✍️</span>Writing</button>
    <button class="mod-tab" onclick="selectModule(3)"><span class="t-icon">🎧</span>Listening</button>
  </div>

  <div class="part-tabs" id="partTabs"></div>

  <div class="card" id="mainCard">
    <div class="card-hdr">
      <div class="part-tag" id="partTag">Part 1</div>
      <div class="card-title" id="cardTitle">—</div>
      <div class="q-count" id="qCount">1/8</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="timer-wrap" id="timerWrap" style="display:none">
      <div class="timer-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="t-bg" cx="36" cy="36" r="30" stroke-width="5"/>
          <circle class="t-fg" id="tCircle" cx="36" cy="36" r="30" stroke-width="5" stroke-dasharray="188.5" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="tNum">30</div>
      </div>
      <div class="timer-info">
        <div class="timer-label" id="tLabel">seconds</div>
        <div class="timer-tip" id="tTip"></div>
      </div>
    </div>
    <div class="card-body" id="cardBody"></div>
    <div class="card-foot" id="cardFoot"></div>
  </div>

  <div class="starters-card" id="startersCard" style="display:none">
    <div class="starters-inner">
      <div class="starters-lbl" id="startersLbl">💬 Useful phrases</div>
      <div class="chips" id="starterChips"></div>
    </div>
  </div>

  <!-- QUICK PART NAV -->
  <div id="quickNav" style="width:100%;display:none;flex-direction:column;gap:6px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:0 2px">⚡ Jump to part</div>
    <div id="quickNavBtns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>

  <div class="pg-footer">OTE B2 Practice · Made with care 💚</div>
</div>

<script>
// ── SCORE ──
let score={c:0,w:0,t:0};
const updScore=()=>{
  document.getElementById('sC').textContent=score.c;
  document.getElementById('sW').textContent=score.w;
  document.getElementById('sT').textContent=score.t;
};

// ── TIMER ──
const CIRC=188.5;
let tInterval=null,tSec=0,tMax=1;
const tEl=()=>({wrap:document.getElementById('timerWrap'),circle:document.getElementById('tCircle'),num:document.getElementById('tNum'),label:document.getElementById('tLabel'),tip:document.getElementById('tTip')});
function showTimer(sec,label,tip=''){const e=tEl();e.wrap.style.display='flex';tMax=sec;tSec=sec;e.num.textContent=sec;e.num.className='timer-num';e.circle.className='t-fg';e.circle.style.strokeDashoffset=0;e.label.textContent=label;e.tip.textContent=tip;}
function startTimer(sec,label,onEnd,tip=''){stopTimer();showTimer(sec,label,tip);tSec=sec;tInterval=setInterval(()=>{tSec--;const e=tEl();if(!e.num)return;e.num.textContent=tSec;e.circle.style.strokeDashoffset=CIRC*(1-tSec/tMax);const w=tSec<=5;e.circle.className='t-fg'+(w?' warn':'');e.num.className='timer-num'+(w?' warn':'');if(tSec<=0){stopTimer();if(onEnd)onEnd();}},1000);}
function stopTimer(){clearInterval(tInterval);tInterval=null;}

// ── LISTENING AUDIO ──
const _at={};
let _progTimer=null;
function audioPlayer(title,text,id){
  _at[id]=text;
  return `<div class="audio-wrap">
    <div class="audio-title">🎧 ${title}</div>
    <div class="audio-row">
      <button class="play-btn" id="${id}-btn" onclick="toggleAudio('${id}')">▶</button>
      <div class="audio-mid">
        <div class="audio-bar"><div class="audio-prog" id="${id}-prog"></div></div>
        <div class="audio-status" id="${id}-st">Press ▶ to listen</div>
      </div>
    </div>
    <div class="audio-hint">🇬🇧 British English · tap ▶ again to stop · you can listen more than once</div>
  </div>`;
}
function toggleAudio(id){
  if(window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();clearInterval(_progTimer);
    const b=document.getElementById(id+'-btn'),s=document.getElementById(id+'-st');
    if(b)b.textContent='▶';if(s)s.textContent='Stopped — press ▶ to listen again';
    return;
  }
  const text=_at[id];if(!text)return;
  const btn=document.getElementById(id+'-btn'),st=document.getElementById(id+'-st'),pg=document.getElementById(id+'-prog');
  if(btn)btn.textContent='⏹';if(st)st.textContent='Loading...';

  function doSpeak(){
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang='en-GB';utt.rate=0.84;utt.pitch=1.0;
    const voices=window.speechSynthesis.getVoices();
    const v=voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en-'))||voices[0]||null;
    if(v)utt.voice=v;
    if(st)st.textContent='Playing...';
    const words=text.split(' ').length,estSec=words/2.2;
    let el=0;clearInterval(_progTimer);
    _progTimer=setInterval(()=>{el+=0.25;if(pg)pg.style.width=Math.min(97,(el/estSec)*100)+'%';},250);
    utt.onend=()=>{clearInterval(_progTimer);if(btn)btn.textContent='▶';if(st)st.textContent='✓ Done — now answer below';if(pg)pg.style.width='100%';};
    utt.onerror=(e)=>{
      clearInterval(_progTimer);if(btn)btn.textContent='▶';
      if(e&&(e.error==='interrupted'||e.error==='canceled')){if(st)st.textContent='Stopped';return;}
      if(st)st.textContent='⚠️ No audio — read the transcript below';
      const tr=document.getElementById('tr-'+id);if(tr)tr.style.display='block';
    };
    window.speechSynthesis.speak(utt);
  }

  const voices=window.speechSynthesis.getVoices();
  if(voices&&voices.length>0){doSpeak();}
  else{
    window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;doSpeak();};
    setTimeout(doSpeak,400); // fallback if event never fires
  }
}
function showTr(id){const el=document.getElementById('tr-'+id);if(el)el.style.display=el.style.display==='none'?'block':'none';}

// ── DATA: LISTENING ──
const LD_PARTS=[
  {name:"Multiple Choice",color:"#1a3a8f",type:"ld_mc",
   starters:["Listen for the KEY words in the question","Focus on what is specifically said, not assumed","Beware of options that are 'almost right'","Listen again if unsure — it's allowed"],
   questions:[
    {title:"Extract 1 · Career Change",
     text:"I've been thinking about changing career for a while now. I work as an accountant, and while the pay is decent, I honestly find the work quite repetitive. My sister keeps suggesting I try teaching, but I'm not sure I have the patience for it. What I'd really love is something creative — maybe graphic design or photography. I've actually started doing an online course in the evenings, so we'll see how it goes.",

    {type:"formal",scenario:"You recently bought a laptop from an online store. It arrived damaged and you've been unable to get a refund through their website. Write a formal email to the store manager.",bullets:["Explain the situation clearly","Say what you have already tried","State what you want them to do"],model:`Dear Sir/Madam,\n\nI am writing to bring to your attention a matter regarding a recent purchase made through your online store.\n\nOn 12 February, I ordered a laptop (Order No. 48291), which arrived in a damaged condition — specifically, with a cracked screen. I have since attempted to resolve this issue through your website's returns portal on three separate occasions, but have been unable to complete the process due to a technical error.\n\nI would be grateful if you could arrange for a full refund to be processed as a matter of urgency, or alternatively, provide a replacement unit. I have attached photographs of the damage and copies of my correspondence for your reference.\n\nI look forward to your prompt response. Should you require any further information, please do not hesitate to contact me.\n\nYours faithfully,\n[Name]`,tips:["Formal salutation: Dear Sir/Madam → Yours faithfully","Include specific details (dates, order numbers)","Use polite but assertive language","One clear request"]},
    {type:"informal",scenario:"Your English friend Sam has invited you to stay for a week, but you can't go on the dates suggested. Write an informal email to Sam.",bullets:["Thank Sam for the invitation","Explain why you can't make those dates","Suggest an alternative time and say what you'd like to do"],model:`Hi Sam!\n\nThanks so much for the invitation — it was so lovely to hear from you! I'd absolutely love to come and visit.\n\nUnfortunately, the dates you suggested don't work for me as I've got my end-of-year exams that week and there's no way I can miss them! It's such a shame.\n\nWould it work if I came the week after instead? I was thinking we could go to that new restaurant you mentioned and maybe do a day trip somewhere — what do you think?\n\nLet me know if that suits you. Can't wait to catch up!\n\nLots of love,\n[Name]`,tips:["Informal: Hi Sam / Lots of love or Take care","Contractions are fine: I'd, I've, can't","Use informal connectors: though, as, so, but","Friendly, warm tone throughout"]},
    {type:"formal",scenario:"You want to apply for a part-time internship at a local newspaper. Write a formal email to the editor expressing your interest.",bullets:["Say who you are and why you're writing","Explain your relevant experience or skills","Ask what the application process is"],model:`Dear Sir/Madam,\n\nI am writing to express my interest in a part-time internship at your publication, having come across the opportunity on your website.\n\nI am currently studying Journalism at university and am keen to gain practical experience in a professional newsroom. I have contributed articles to my university newspaper for the past two years, covering topics ranging from local politics to cultural events, and have developed strong research, writing and editing skills as a result.\n\nI would be most grateful if you could advise me on the application process and any documents I should submit. I have attached my CV for your initial consideration.\n\nI look forward to hearing from you.\n\nYours faithfully,\n[Name]`,tips:["Formal application: confident but not arrogant","Mention specific, relevant experience","End with a clear, polite request","No contractions, no informal vocabulary"]},
    {type:"informal",scenario:"Your English friend Alex has just passed an important exam. Write an email to congratulate them and suggest celebrating together.",bullets:["Congratulate them warmly","Ask how they feel","Suggest something specific you could do to celebrate"],model:`Hey Alex!\n\nOh my goodness, I just heard the news — congratulations!!! You absolutely deserve it after all that hard work. I'm SO happy for you!\n\nHow are you feeling? I bet you're absolutely relieved! All those late-night study sessions were definitely worth it.\n\nWe have to celebrate! How about we go for dinner at that Italian place you've been wanting to try? Or if you fancy something more low-key, we could just grab some food at mine — I'll cook! Whatever you prefer, just let me know.\n\nSo proud of you. Speak soon!\n\n[Name]`,tips:["Exclamation marks are fine in informal writing","Use enthusiastic language: SO happy, absolutely, definitely","Give a specific suggestion, not just 'let's celebrate'","Match the energy to a genuinely happy occasion"]},
    {type:"formal",scenario:"You attended a company training day last week but were disappointed with the organisation. Write a formal email to the HR manager.",bullets:["Explain which event you attended","State your main concern(s)","Suggest how things could be improved"],model:`Dear Sir/Madam,\n\nI am writing with regard to the training day held on 15 March, which I attended as a member of the marketing team.\n\nWhile I found the content of the sessions informative, I am writing to raise some concerns about the organisation of the event. In particular, the afternoon sessions began significantly later than scheduled, which meant that the final presentation was rushed and several participants were unable to attend the closing discussion.\n\nI would suggest that future events include a more realistic timetable, with adequate time built in for transitions between sessions. I believe this would greatly improve the overall experience for attendees.\n\nThank you for taking the time to consider my feedback. I would be happy to discuss this further if that would be helpful.\n\nYours faithfully,\n[Name]`,tips:["'With regard to' is a formal opener for complaints","Be constructive — always end with a suggestion","Use passive voice: 'were unable to attend' rather than 'couldn't go'","Thank them for reading — maintains politeness"]},
    {type:"informal",scenario:"A friend is thinking of moving to your city. Write an email giving them advice about life there.",bullets:["Welcome the idea warmly","Give 2–3 practical pieces of advice","Offer to help them settle in"],model:`Hey!\n\nOh wow, that would be amazing if you moved here! I'd love having you nearby — seriously, do it!\n\nOK so a few things worth knowing: transport is actually pretty good if you get a monthly travel card, it works out so much cheaper than buying individual tickets. For accommodation, I'd avoid the city centre if you're on a budget — there are some really nice areas a bit further out that are much more affordable and still really well connected.\n\nAlso, there's a brilliant Saturday market near me — perfect for cheap food and getting to know the neighbourhood. I'll definitely take you when you visit!\n\nSeriously though, let me know if you need help finding a place or have any questions. I'm more than happy to show you around when you come to have a look. So excited!\n\n[Name]`,tips:["Informal: specific, friendly, personal","Use 'actually', 'seriously', 'so much' for natural informal register","Give concrete advice, not just 'it's great here'","Offer help — shows genuine warmth"]},

// ── STATE ──
let mod=0,part=0,qIdx=0,fupIdx=0,selPhotos=[];
let shuffled={sp:[],rd:[],wr:[],ld:[]};
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
function initShuffled(){
  shuffled.sp=SP_PARTS.map(p=>shuffle([...p.questions]));
  shuffled.rd=RD_PARTS.map(p=>shuffle([...p.questions]));
  shuffled.wr=WR_PARTS.map(p=>shuffle([...p.questions]));
  shuffled.ld=LD_PARTS.map(p=>shuffle([...p.questions]));
}
initShuffled();

// ── MODULE / PART SELECT ──
function selectModule(m){
  stopTimer();
  if(window.speechSynthesis&&window.speechSynthesis.speaking)window.speechSynthesis.cancel();
  mod=m;part=0;qIdx=0;fupIdx=0;selPhotos=[];
  document.querySelectorAll('.mod-tab').forEach((t,i)=>t.classList.toggle('active',i===m));
  renderPartTabs();renderCard();
}
function selectPart(p){
  stopTimer();
  if(window.speechSynthesis&&window.speechSynthesis.speaking)window.speechSynthesis.cancel();
  part=p;qIdx=0;fupIdx=0;selPhotos=[];
  document.querySelectorAll('.part-tab').forEach((t,i)=>t.classList.toggle('active',i===p));
  renderCard();
}
function renderPartTabs(){
  const data=mod===0?SP_PARTS:mod===1?RD_PARTS:mod===2?WR_PARTS:LD_PARTS;
  document.getElementById('partTabs').innerHTML=data.map((p,i)=>`
    <button class="part-tab${i===0?' active':''}" onclick="selectPart(${i})" style="${i===0?`border-color:${p.color};background:${p.color};color:#fff`:''}">
      <span class="pt-num" style="${i===0?'color:#fff':''}">${i+1}</span>${p.name}
    </button>`).join('');
}
function highlightPartTab(){
  const data=mod===0?SP_PARTS:mod===1?RD_PARTS:mod===2?WR_PARTS:LD_PARTS;
  document.querySelectorAll('.part-tab').forEach((t,i)=>{
    const ac=i===part;t.classList.toggle('active',ac);
    t.style.borderColor=ac?data[i].color:'';t.style.background=ac?data[i].color:'';
    t.style.color=ac?'#fff':'';t.querySelector('.pt-num').style.color=ac?'#fff':'';
  });
}

// ── RENDER CARD ──
const $=id=>document.getElementById(id);
function setHeader(title,count){$('cardTitle').textContent=title;$('qCount').textContent=count;}
function setProgress(cur,tot){$('progFill').style.width=`${(cur/tot)*100}%`;}
function clearTimer(){$('timerWrap').style.display='none';}
function mkBtn(cls,txt,onclick,color=''){const b=document.createElement('button');b.className=`btn ${cls}`;b.textContent=txt;b.onclick=onclick;if(color)b.style.background=color;return b;}
function nextQ(qs,render){qIdx=(qIdx+1)%qs.length;fupIdx=0;selPhotos=[];render();}

function renderQuickNav(){
  const data=mod===0?SP_PARTS:mod===1?RD_PARTS:mod===2?WR_PARTS:LD_PARTS;
  if(data.length<=1){document.getElementById('quickNav').style.display='none';return;}
  document.getElementById('quickNav').style.display='flex';
  document.getElementById('quickNavBtns').innerHTML=data.map((p,i)=>`
    <button onclick="selectPart(${i})" style="
      flex:1;min-width:60px;padding:8px 6px;border-radius:10px;font-size:11px;font-weight:700;
      cursor:pointer;font-family:'Outfit',sans-serif;touch-action:manipulation;
      border:1.5px solid ${i===part?p.color:'var(--border)'};
      background:${i===part?p.color:'var(--card)'};
      color:${i===part?'#fff':'var(--muted)'};
      transition:all .18s;text-align:center;line-height:1.3;
    ">${i===part?'▶ ':''}Part ${i+1}<br><span style="font-size:10px;font-weight:500;opacity:.85">${p.name.split(' ')[0]}</span></button>
  `).join('');
}

function renderCard(){
  highlightPartTab();stopTimer();
  const data=mod===0?SP_PARTS:mod===1?RD_PARTS:mod===2?WR_PARTS:LD_PARTS;
  const p=data[part];
  $('partTag').textContent=`Part ${part+1}`;$('partTag').style.background=p.color;
  $('progFill').style.background=p.color;
  if(p.starters&&p.starters.length){
    $('startersCard').style.display='';
    $('starterChips').innerHTML=p.starters.map(s=>{
      const clean=s.replace(/[.…,]/g,'').trim();
      const url='https://www.playphrase.me/#/search?q='+encodeURIComponent(clean);
      return `<a class="chip" href="${url}" target="_blank" rel="noopener" style="text-decoration:none;cursor:pointer" title="Hear in movies 🎬">${s} <span style="font-size:10px;opacity:.6">🎬</span></a>`;
    }).join('');
    $('startersLbl').textContent=mod===0?'💬 Useful phrases — tap to hear in movies 🎬':mod===3?'🎧 Listening tips':'📝 Key language — tap to hear in movies 🎬';
  } else $('startersCard').style.display='none';
  if(mod===0)renderSpeaking(p);
  else if(mod===1)renderReading(p);
  else if(mod===2)renderWriting(p);
  else renderListening(p);
  renderQuickNav();
}

// ── SPEAKING ──
function renderSpeaking(p){
  const qs=shuffled.sp[part];
  if(part===0)renderInterview(p,qs);
  else if(part===1)renderVoicemail(p,qs);

  $('cardFoot').innerHTML='';
}

window.answerTF=function(i,ans,correct,exp){
  const item=document.getElementById('tfi'+i);
  const expEl=document.getElementById('tfe'+i);
  if(!item||item.dataset.done)return;
  item.dataset.done='1';
  item.querySelectorAll('button').forEach(b=>b.disabled=true);
  const ok=ans===correct;
  item.classList.add(ok?'good':'bad');
  expEl.innerHTML=`<strong>${correct==='T'?'✅ TRUE':correct==='F'?'❌ FALSE':'❓ NOT MENTIONED'}</strong> — ${exp}`;
  expEl.classList.add('show');
  score.t++;if(ok)score.c++;else score.w++;updScore();
  window._tfAnswered=(window._tfAnswered||0)+1;
  if(window._tfAnswered>=(window._tfTotal||5))showNextBtn(()=>nextQ(shuffled.ld[part],()=>renderListening(LD_PARTS[part])));
};

// ── PLAYPHRASE ──
function ppBtn(phrase){
  const clean=phrase.replace(/[^\w\s']/g,'').trim();
  if(!clean||clean.length<3)return '';
  const url='https://www.playphrase.me/#/search?q='+encodeURIComponent(clean);
  return `<a href="${url}" target="_blank" rel="noopener" class="pp-link">🎬 Hear <em>"${clean}"</em> in movies</a>`;
}

// ── VOICES PRELOAD ──
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

// ── INIT ──
selectModule(0);
</script>
